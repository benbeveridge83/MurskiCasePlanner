<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Murski Case Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h2>Loading...</h2>

<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";
window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function ensureCaseContext() {
  const urlParams = new URLSearchParams(window.location.search);
  let caseId = urlParams.get("case") || localStorage.getItem("murski_selected_case_id");

  if (caseId) {
    urlParams.set("case", caseId);
    window.location.replace(`${window.location.pathname}?${urlParams.toString()}`);
    return;
  }

  const { data: userRes } = await window.supabase.auth.getUser();
  const user = userRes?.user;
  if (!user) return;

  const { data: memberships } = await window.supabase
    .from("case_members")
    .select("case_id")
    .eq("user_id", user.id)
    .limit(1);

  if (memberships && memberships.length > 0) {
    const newCaseId = memberships[0].case_id;
    localStorage.setItem("murski_selected_case_id", newCaseId);

    const params = new URLSearchParams(window.location.search);
    params.set("case", newCaseId);
    window.location.replace(`${window.location.pathname}?${params.toString()}`);
  }
}

async function start() {
  await ensureCaseContext();
}

start();
</script>
</body>
</html>
