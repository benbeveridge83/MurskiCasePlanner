<html lang="en">
<head>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

    const SUPABASE_URL = "https://ewemahyfoegkpzgpqnsr.supabase.co"
    const SUPABASE_KEY = "sb_publishable_0ddiJfYLmhk9maLNcYJakg_aUMkvWRO"

    const urlParams = new URLSearchParams(window.location.search)
    const CASE_ID = urlParams.get("case") || ""
    const INITIAL_VIEW = (urlParams.get("view") || "outline").toLowerCase()
    window.INITIAL_VIEW = INITIAL_VIEW

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
    const DOCUMENT_BUCKET = "case-documents"

    window.supabase = supabase
    window.CASE_ID = CASE_ID

    const LOCAL_SYNC_KEY = `murski_live_sync_${CASE_ID || "global"}`
    window.LOCAL_SYNC_KEY = LOCAL_SYNC_KEY

    function broadcastLocalSync(type, extra = {}) {
      try {
        localStorage.setItem(
          LOCAL_SYNC_KEY,
          JSON.stringify({ type, at: Date.now(), ...extra })
        )
      } catch (e) {
        console.warn("Local sync broadcast failed:", e)
      }
    }

    let outlineLoadInFlight = null
    let outlineLoadQueued = false
    let outlineRealtimeTimer = null
    let suppressOutlineRealtimeUntil = 0

    function suppressOutlineRealtime(ms = 1200) {
      suppressOutlineRealtimeUntil = Math.max(suppressOutlineRealtimeUntil, Date.now() + ms)
      window.suppressOutlineRealtimeUntil = suppressOutlineRealtimeUntil
    }

    async function loadOutlineRows(force = false) {
      if (!force && outlineLoadInFlight) {
        outlineLoadQueued = true
        return outlineLoadInFlight
      }

      outlineLoadInFlight = (async () => {
        const { data, error } = await supabase
          .from("outline_rows")
          .select("*")
          .eq("case_id", CASE_ID)
          .order("sort_order", { ascending: true })

        if (error) {
          console.error("Load error:", error)
          return
        }

        window.loadedRows = data

        if (window.syncOutlineFromSupabase) {
          window.syncOutlineFromSupabase();
        }

        if (window.isOutlineEditing) {
          window.pendingOutlineRefresh = true;
          return;
        }

        if (window.renderOutline) {
          window.renderOutline();
        }
      })()

      try {
        await outlineLoadInFlight
      } finally {
        outlineLoadInFlight = null
        if (outlineLoadQueued) {
          outlineLoadQueued = false
          queueMicrotask(() => loadOutlineRows())
        }
      }
    }
